<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 640" role="img" aria-labelledby="title desc">
  <title id="title">AI4SS research infrastructure header</title>
  <desc id="desc">A dark infrastructure map for AI4SS showing agent skills, a .aiss research object, validation gates, evaluation evidence, and bounded scholarly handoff.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.58" stop-color="#111827"/>
      <stop offset="1" stop-color="#0d2a2a"/>
    </linearGradient>
    <linearGradient id="core" x1="760" y1="96" x2="1130" y2="498" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ccfbf1"/>
      <stop offset="0.48" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="panel" x1="70" y1="482" x2="1210" y2="586" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc" stop-opacity="0.14"/>
      <stop offset="0.5" stop-color="#5eead4" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f8fafc" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="22" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <pattern id="micro-grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#263244" stroke-width="1" opacity="0.34"/>
    </pattern>
    <style>
      .sans { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .label { font-size: 18px; font-weight: 800; letter-spacing: 3px; fill: #5eead4; }
      .body { font-size: 24px; font-weight: 650; fill: #cbd5e1; }
      .small { font-size: 17px; font-weight: 750; fill: #e2e8f0; }
      .tiny { font-size: 13px; font-weight: 800; letter-spacing: 1.6px; fill: #99f6e4; }
    </style>
  </defs>

  <rect width="1440" height="640" rx="40" fill="url(#bg)"/>
  <rect width="1440" height="640" rx="40" fill="url(#micro-grid)" opacity="0.58"/>
  <rect x="32" y="32" width="1376" height="576" rx="30" fill="none" stroke="#334155" stroke-width="2"/>
  <path d="M44 467H1396" stroke="#5eead4" stroke-width="2" opacity="0.34"/>

  <g class="sans" transform="translate(76 78)">
    <text class="label" x="0" y="0">AI4SS RESEARCH INFRASTRUCTURE</text>
    <text x="0" y="92" font-size="82" font-weight="950" fill="#f8fafc">Make agent work</text>
    <text x="0" y="176" font-size="82" font-weight="950" fill="#f8fafc">inspectable.</text>
    <text class="body" x="2" y="238">Skills, DSL, validators, and eval packets for</text>
    <text class="body" x="2" y="272">computational social science with AI agents.</text>
  </g>

  <g class="mono" transform="translate(82 398)">
    <rect x="0" y="0" width="258" height="50" rx="12" fill="#0f172a" stroke="#5eead4" stroke-width="1.5"/>
    <text x="22" y="32" font-size="18" font-weight="850" fill="#ccfbf1">skills/&lt;name&gt;/</text>
    <path d="M276 25H412" stroke="#5eead4" stroke-width="3" stroke-linecap="round"/>
    <path d="M412 25l-15-10v20z" fill="#5eead4"/>
    <rect x="440" y="0" width="182" height="50" rx="12" fill="#0f172a" stroke="#5eead4" stroke-width="1.5"/>
    <text x="462" y="32" font-size="18" font-weight="850" fill="#ccfbf1">.aiss v0.4</text>
    <path d="M640 25H728" stroke="#5eead4" stroke-width="3" stroke-linecap="round"/>
    <path d="M728 25l-15-10v20z" fill="#5eead4"/>
    <rect x="756" y="0" width="214" height="50" rx="12" fill="#0f172a" stroke="#5eead4" stroke-width="1.5"/>
    <text x="778" y="32" font-size="18" font-weight="850" fill="#ccfbf1">bounded handoff</text>
  </g>

  <g transform="translate(970 76) scale(0.78)" filter="url(#soft-shadow)">
    <path d="M244 0L470 130v260L244 520L18 390V130z" fill="#0f172a" stroke="#5eead4" stroke-width="3"/>
    <path d="M244 54L422 156v208L244 466L66 364V156z" fill="#111827" stroke="#2dd4bf" stroke-width="2" opacity="0.92"/>
    <path d="M244 112L370 184v144L244 400L118 328V184z" fill="url(#core)"/>
    <path d="M244 112v288M118 184l252 144M370 184L118 328" stroke="#0f172a" stroke-width="3" opacity="0.52"/>
    <text class="sans" x="244" y="256" text-anchor="middle" font-size="54" font-weight="950" fill="#082f2e">.aiss</text>
    <text class="mono" x="244" y="294" text-anchor="middle" font-size="21" font-weight="850" fill="#0f172a">research object</text>

    <g class="mono">
      <text class="tiny" x="244" y="32" text-anchor="middle">ROUTES</text>
      <text class="tiny" x="424" y="132" text-anchor="middle">SOURCES</text>
      <text class="tiny" x="424" y="392" text-anchor="middle">GATES</text>
      <text class="tiny" x="244" y="502" text-anchor="middle">EVALS</text>
      <text class="tiny" x="62" y="392" text-anchor="middle">CLAIMS</text>
      <text class="tiny" x="62" y="132" text-anchor="middle">DESIGN</text>
    </g>
  </g>

  <g class="sans" transform="translate(72 500)">
    <rect x="0" y="0" width="1296" height="82" rx="22" fill="url(#panel)" stroke="#5eead4" stroke-width="1.5" opacity="0.95"/>
    <g transform="translate(32 18)">
      <text x="0" y="21" font-size="30" font-weight="950" fill="#f8fafc">19</text>
      <text class="small" x="0" y="48">skills</text>
    </g>
    <g transform="translate(252 18)">
      <text x="0" y="21" font-size="30" font-weight="950" fill="#f8fafc">.aiss v0.4</text>
      <text class="small" x="0" y="48">research IR</text>
    </g>
    <g transform="translate(548 18)">
      <text x="0" y="21" font-size="30" font-weight="950" fill="#f8fafc">12</text>
      <text class="small" x="0" y="48">workflow gates</text>
    </g>
    <g transform="translate(800 18)">
      <text x="0" y="21" font-size="30" font-weight="950" fill="#f8fafc">4</text>
      <text class="small" x="0" y="48">eval tracks</text>
    </g>
    <g transform="translate(1034 18)">
      <text x="0" y="21" font-size="30" font-weight="950" fill="#f8fafc">78.7 / 100</text>
      <text class="small" x="0" y="48">structural factory score</text>
    </g>
  </g>
</svg>

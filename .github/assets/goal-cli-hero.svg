<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">goal-cli product banner</title>
  <desc id="desc">A premium banner for goal-cli showing an artifact-first autonomous runtime and a terminal heartbeat.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1200" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F4EC"/>
      <stop offset="0.54" stop-color="#EEF4EF"/>
      <stop offset="1" stop-color="#EAF2F8"/>
    </linearGradient>
    <linearGradient id="ink" x1="90" y1="60" x2="1110" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0F1F"/>
      <stop offset="1" stop-color="#102A2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="188" y1="120" x2="1040" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="0.42" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#EEF2FF" stop-opacity="0.62"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <filter id="tinyGlow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.05 0 0 0 0 0.45 0 0 0 0 0.4 0 0 0 0.45 0" result="color"/>
      <feMerge>
        <feMergeNode in="color"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="microgrid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#0F172A" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="560" rx="34" fill="url(#paper)"/>
  <rect width="1200" height="560" rx="34" fill="url(#microgrid)"/>
  <path d="M922 42L1158 42L1158 278C1048 278 958 194 922 42Z" fill="#111827" fill-opacity="0.06"/>
  <path d="M82 474C244 420 330 432 454 356C584 276 714 278 854 204C960 148 1028 105 1114 70" stroke="url(#accent)" stroke-width="2.5" stroke-opacity="0.62"/>
  <path d="M88 454C250 398 338 410 461 336C590 258 720 260 859 186C966 129 1028 96 1110 62" stroke="#FFFFFF" stroke-width="9" stroke-opacity="0.34"/>

  <g font-family="Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <g transform="translate(72 64)">
      <rect x="0" y="0" width="346" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.74" stroke="#111827" stroke-opacity="0.08"/>
      <circle cx="24" cy="19" r="6" fill="#0F766E"/>
      <text x="42" y="24" fill="#111827" font-size="13" font-weight="800" letter-spacing="1.5">ARTIFACT-FIRST AGENT RUNTIME</text>
    </g>

    <text x="72" y="164" fill="#0A0F1F" font-size="82" font-weight="900" letter-spacing="-1">goal-cli</text>
    <text x="76" y="218" fill="#162032" font-size="30" font-weight="760" letter-spacing="0">Autonomy with a product standard.</text>
    <text x="76" y="260" fill="#485568" font-size="20" font-weight="500" letter-spacing="0">Build the artifact. Critique the artifact. Repair only bounded sources.</text>
    <text x="76" y="288" fill="#485568" font-size="20" font-weight="500" letter-spacing="0">No chat-log victory laps. No self-graded completion.</text>

    <g transform="translate(76 336)" filter="url(#softShadow)">
      <rect width="392" height="112" rx="28" fill="#0A0F1F"/>
      <rect x="7" y="7" width="378" height="98" rx="22" fill="#111827"/>
      <text x="28" y="38" fill="#9CA3AF" font-size="15" font-weight="600" letter-spacing="0">$ goal-cli run</text>
      <text x="28" y="67" fill="#D1FAE5" font-size="15" font-weight="700" letter-spacing="0">producer  rebuilt  output/full_paper.pdf</text>
      <text x="28" y="91" fill="#FDE68A" font-size="15" font-weight="700" letter-spacing="0">tik       found  3 artifact blockers</text>
    </g>

    <g transform="translate(500 336)" filter="url(#softShadow)">
      <rect width="220" height="112" rx="28" fill="#FFFFFF" fill-opacity="0.72"/>
      <rect x="7" y="7" width="206" height="98" rx="22" fill="#F8FAFC" stroke="#111827" stroke-opacity="0.08"/>
      <text x="28" y="38" fill="#111827" font-size="15" font-weight="850" letter-spacing="0">tok report</text>
      <text x="28" y="67" fill="#475569" font-size="14" font-weight="650" letter-spacing="0">source_change_possible</text>
      <text x="28" y="91" fill="#0F766E" font-size="15" font-weight="850" letter-spacing="0">true</text>
    </g>

    <g transform="translate(752 78)" filter="url(#softShadow)">
      <rect width="374" height="384" rx="36" fill="#0A0F1F"/>
      <rect x="9" y="9" width="356" height="366" rx="28" fill="url(#ink)"/>
      <rect x="28" y="30" width="104" height="10" rx="5" fill="#E5E7EB" fill-opacity="0.82"/>
      <rect x="28" y="58" width="286" height="12" rx="6" fill="#E5E7EB" fill-opacity="0.15"/>
      <rect x="28" y="82" width="232" height="12" rx="6" fill="#E5E7EB" fill-opacity="0.12"/>
      <rect x="28" y="122" width="318" height="80" rx="20" fill="#F8FAFC" fill-opacity="0.08" stroke="#F8FAFC" stroke-opacity="0.12"/>
      <text x="50" y="155" fill="#F8FAFC" font-size="17" font-weight="850" letter-spacing="0">canonical artifact</text>
      <text x="50" y="181" fill="#CBD5E1" font-size="14" font-weight="600" letter-spacing="0">The only success surface.</text>

      <g transform="translate(28 232)">
        <rect width="318" height="90" rx="22" fill="#FFFFFF" fill-opacity="0.94"/>
        <text x="24" y="34" fill="#0A0F1F" font-size="15" font-weight="850" letter-spacing="0">heartbeat contract</text>
        <text x="24" y="60" fill="#475569" font-size="14" font-weight="650" letter-spacing="0">producer -> tik -> tok -> rebuild</text>
      </g>

      <g filter="url(#tinyGlow)">
        <circle cx="64" cy="350" r="7" fill="#34D399"/>
        <circle cx="94" cy="350" r="7" fill="#FDE047"/>
        <circle cx="124" cy="350" r="7" fill="#A78BFA"/>
      </g>
      <text x="154" y="356" fill="#CBD5E1" font-size="13" font-weight="700" letter-spacing="0">state in files, traces in OTLP</text>
    </g>

    <g transform="translate(72 490)">
      <text x="0" y="0" fill="#0F172A" font-size="15" font-weight="850" letter-spacing="0">one artifact</text>
      <text x="116" y="0" fill="#64748B" font-size="15" font-weight="700" letter-spacing="0">one producer</text>
      <text x="244" y="0" fill="#64748B" font-size="15" font-weight="700" letter-spacing="0">one critic</text>
      <text x="348" y="0" fill="#64748B" font-size="15" font-weight="700" letter-spacing="0">one bounded repair</text>
    </g>
  </g>
</svg>

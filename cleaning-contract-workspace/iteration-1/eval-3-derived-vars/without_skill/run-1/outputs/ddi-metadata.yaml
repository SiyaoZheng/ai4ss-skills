  n_vars: 306
processing_events:
- event_id: evt001
  type: CleaningOperation
  timestamp: '2026-04-28T17:51:58Z'
  skill_version: '1.0'
  description: Initial metadata extraction from Stata .dta source file via haven/labelled. Structurally inapplicable variables
    (all -1) flagged for China.
  inputs:
  - /Users/siyaozheng/Library/CloudStorage/Dropbox/Project on Social Cleavages in China/Data/Asian Barometer Surveys/W5_4_MainlandChina/W5_China_CoreQ_release_20231213.dta
  outputs:
  - ddi-metadata.yaml
  operator: null
- event_id: evt002
  type: CleaningContract
  timestamp: '2026-04-28T18:00:00Z'
  skill_version: '1.0'
  description: >-
    Cleaning contract authored for ABS Wave 5 China dataset. Universe: all observations
    (China-only file, no filter needed). Weight variable w flagged is_weight=true and
    registered in data_structure. Trust variables q8-q15 and q17 identified for
    recode and reversal (1-6 scale, high=distrust -> reversed to high=trust).
    q7 (trust in executive/president) and q16 (electoral commission) confirmed
    structurally inapplicable for China and excluded from analysis vars.
    Derived variable trad_media skipped: source variables tv_freq, newspaper_freq,
    radio_freq not present in dataset.
  inputs:
  - ddi-metadata.yaml
  outputs:
  - outputs/ddi-metadata.yaml
  operator: null
cleaning_contract:
  universe:
    condition: null
    note: >-
      Dataset is already filtered to Mainland China only (country==4). All 4941
      observations are included.
  weight_assignment:
    variable: w
    is_weight: true
    note: Post-stratification weight provided by ABS. Range 0.54–1.73. Apply in all
      survey-weighted analyses.
  shared_recodes:
    abs_trust_to_na:
      description: >-
        Recode standard ABS missing codes for trust/confidence items to NA.
        97=inapplicable (do not understand question), 98=don't know, 99=refused.
        -1=structurally inapplicable (institution does not exist in China).
      recode_map:
        -1: NA
        97: NA
        98: NA
        99: NA
    trust_reversal:
      description: >-
        Original ABS trust scale runs 1=Trust fully to 6=Distrust fully (higher
        values indicate MORE distrust). Reverse so that higher values indicate
        MORE trust: reversed = 7 - original. Applied after missing recode.
        Reversed range: 1 (Distrust fully) to 6 (Trust fully).
      formula: "7 - x"
  variable_contracts:
  - variable: w
    label: Survey weight
    action: mark_weight
    is_weight: true
    missing_recode: {}
    note: No missing values expected; range validated against 0.54–1.73.
  - variable: SE3_1
    label: Respondent age (actual age in years)
    action: keep_numeric
    missing_recode:
      -1: NA
      999: NA
    valid_range: [18, 120]
    note: Use SE3_1 (actual age) rather than SE3 (birth year) for direct numeric
      age. Values outside 18-120 treated as missing.
  - variable: SE2
    label: Gender
    action: recode_factor
    missing_recode:
      -1: NA
    value_labels:
      1: Male
      2: Female
      3: Other
    note: Retain all three categories; collapse Other only if cell size too small
      for analysis.
  - variable: SE5
    label: Education level (ordinal)
    action: recode_ordered_factor
    missing_recode:
      -1: NA
      97: NA
      98: NA
      99: NA
    value_labels:
      1: No formal education
      2: Incomplete primary
      3: Complete primary
      4: Incomplete secondary vocational
      5: Complete secondary vocational
      6: Incomplete secondary academic
      7: Complete secondary academic
      8: Some university
      9: University completed
      10: Post-graduate
      11: Other
    note: >-
      Code 11 (Other) is ambiguous for ordinal scaling; treat as NA in scale
      analyses or keep as separate category in descriptive analyses.
  - variable: q7
    label: Trust in executive office (president or prime minister)
    action: exclude_structurally_inapplicable
    missing_recode:
      -1: NA
    note: >-
      All observations coded -1. China does not have a directly elected president
      or prime minister in the ABS comparative sense — the institution is
      structurally absent. This is NOT skip-logic missing; -1 reflects the survey
      design for non-applicable countries. Exclude from all trust indices and
      analysis variables.
  - variable: q8
    label: Trust in the courts
    action: recode_and_reverse
    missing_recode:
      -1: NA
      97: NA
      98: NA
      99: NA
    reversal: abs_trust_to_trust
    formula: "7 - x"
    reversed_range: [1, 6]
    reversed_label: "1=Distrust fully, 6=Trust fully"
    output_variable: q8_r
    note: Standard trust item; available for China. Reversed after missing recode.
  - variable: q9
    label: Trust in national government
    action: recode_and_reverse
    missing_recode:
      -1: NA
      97: NA
      98: NA
      99: NA
    formula: "7 - x"
    reversed_range: [1, 6]
    reversed_label: "1=Distrust fully, 6=Trust fully"
    output_variable: q9_r
    note: Core political trust item for central government.
  - variable: q10
    label: Trust in political parties
    action: recode_and_reverse
    missing_recode:
      -1: NA
      97: NA
      98: NA
      99: NA
    formula: "7 - x"
    reversed_range: [1, 6]
    reversed_label: "1=Distrust fully, 6=Trust fully"
    output_variable: q10_r
    note: Political parties here refers to parties generally, not a specific party.
  - variable: q11
    label: Trust in parliament (National People's Congress)
    action: recode_and_reverse
    missing_recode:
      -1: NA
      97: NA
      98: NA
      99: NA
    formula: "7 - x"
    reversed_range: [1, 6]
    reversed_label: "1=Distrust fully, 6=Trust fully"
    output_variable: q11_r
    note: In China context, parliament = National People's Congress (NPC).
  - variable: q12
    label: Trust in civil service
    action: recode_and_reverse
    missing_recode:
      -1: NA
      97: NA
      98: NA
      99: NA
    formula: "7 - x"
    reversed_range: [1, 6]
    reversed_label: "1=Distrust fully, 6=Trust fully"
    output_variable: q12_r
    note: Available for China.
  - variable: q13
    label: Trust in the military
    action: recode_and_reverse
    missing_recode:
      -1: NA
      97: NA
      98: NA
      99: NA
    formula: "7 - x"
    reversed_range: [1, 6]
    reversed_label: "1=Distrust fully, 6=Trust fully"
    output_variable: q13_r
    note: Available for China (People's Liberation Army).
  - variable: q14
    label: Trust in the police
    action: recode_and_reverse
    missing_recode:
      -1: NA
      97: NA
      98: NA
      99: NA
    formula: "7 - x"
    reversed_range: [1, 6]
    reversed_label: "1=Distrust fully, 6=Trust fully"
    output_variable: q14_r
    note: Available for China.
  - variable: q15
    label: Trust in local government
    action: recode_and_reverse
    missing_recode:
      -1: NA
      97: NA
      98: NA
      99: NA
    formula: "7 - x"
    reversed_range: [1, 6]
    reversed_label: "1=Distrust fully, 6=Trust fully"
    output_variable: q15_r
    note: Available for China.
  - variable: q16
    label: Trust in the election commission
    action: exclude_structurally_inapplicable
    missing_recode:
      -1: NA
    note: >-
      All observations coded -1. China does not have an independent electoral
      commission — elections are administered by party-state organs without a
      separate commission. Structurally inapplicable, not skip-logic missing.
      Exclude from all analyses.
  - variable: q17
    label: Trust in NGOs
    action: recode_and_reverse
    missing_recode:
      -1: NA
      97: NA
      98: NA
      99: NA
    formula: "7 - x"
    reversed_range: [1, 6]
    reversed_label: "1=Distrust fully, 6=Trust fully"
    output_variable: q17_r
    note: Available for China. NGO civil society context differs from liberal
      democracies but the item is not structurally inapplicable.
  derived_variables:
    trad_media:
      skip: true
      reason: >-
        Source variables tv_freq, newspaper_freq, and radio_freq are not present
        in the ABS Wave 5 China dataset. The dataset contains media trust items
        (q53-q55) but not media consumption frequency variables. Derived variable
        trad_media is therefore not computed.
  analysis_vars:
    demographics:
    - name: SE3_1
      clean_name: age
      role: covariate
    - name: SE2
      clean_name: sex
      role: covariate
    - name: SE5
      clean_name: edu
      role: covariate
    weight:
    - name: w
      clean_name: w
      role: weight
    political_trust:
    - name: q8_r
      source: q8
      label: Trust courts (reversed)
      role: outcome
    - name: q9_r
      source: q9
      label: Trust national government (reversed)
      role: outcome
    - name: q10_r
      source: q10
      label: Trust political parties (reversed)
      role: outcome
    - name: q11_r
      source: q11
      label: Trust parliament/NPC (reversed)
      role: outcome
    - name: q12_r
      source: q12
      label: Trust civil service (reversed)
      role: outcome
    - name: q13_r
      source: q13
      label: Trust military (reversed)
      role: outcome
    - name: q14_r
      source: q14
      label: Trust police (reversed)
      role: outcome
    - name: q15_r
      source: q15
      label: Trust local government (reversed)
      role: outcome
    - name: q17_r
      source: q17
      label: Trust NGOs (reversed)
      role: outcome
    excluded_structurally_inapplicable:
    - name: q7
      reason: China has no directly elected president/PM in comparative ABS sense
    - name: q16
      reason: China has no independent electoral commission

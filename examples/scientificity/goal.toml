name = "scientificity-publication-pdf"
# Copy this file to the scientificity repository root before running goal-cli.
state_dir = ".goal"
runs_dir = ".goal/runs"

[artifact]
path = "output/scientificity-paper.pdf"
copy_as = "full_paper.pdf"

[producer]
command = "make all"

[tik]
provider = "codex_file"
timeout_seconds = 1800
max_file_size_bytes = 25000000
max_output_tokens = 4096

[tik.verdict]
ready_field = "artifact_ready"
blockers_field = "blocking_objections"
required_fields = ["artifact_ready", "blocking_objections"]
fingerprint_fields = ["blocking_objections"]

[tik.prompt]
text = """
/apsr-review

You are an APSR reviewer. Review only full_paper.pdf.
Standard: ready for publication.

Write a referee report.

End with one fenced JSON verdict block for goal-cli routing:
```json
{
  "artifact_ready": false,
  "blocking_objections": ["short label for each fatal objection"]
}
```
Set artifact_ready=true only if the PDF is ready for publication; then
blocking_objections=[].
"""

[tok]
provider = "codex_goal"
sandbox = "workspace-write"
write_dirs = ["writing", "src"]
codex_features = ["goals"]

[tok.prompt]
template = """
The goal is to keep working on the paper so it reaches the publication
standard of APSR. Note that the paper PDF is produced by `{producer_command}`,
so you should work in writing/ and src/ rather than generated output, data,
logs, or the PDF.

Use the attached referee report at {tik_review_path}.
"""

[no_mistakes]
enabled = true
binary = "no-mistakes"
branch_prefix = "goal-cli"
skip_steps = []
intent = """
Drive one fully automatic scientificity publication-PDF heartbeat: rebuild the
current PDF, run a fresh PDF-only referee review through goal-cli, apply source
revisions in writing/ or src/, keep the Git worktree clean between heartbeats,
and gate the checkpoint with no-mistakes.
"""

[observability]
service_name = "goal-cli"
endpoint = "http://localhost:4318/v1/traces"
timeout_seconds = 5

[safety]
generated_dirs = ["output", "build"]
max_blocker_repeats = 3
lock_stale_seconds = 21600
max_history_items = 50
